<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
    body {
        font-family: "Inter", Arial, sans-serif;
        background: #0b0b0f;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Container */
    .login-container {
        background: #121217;
        padding: 35px;
        border-radius: 14px;
        width: 360px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        border: 1px solid #1f1f25;
    }

    /* Title */
    h2 {
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: 500;
    }

    /* Subtitle */
    .subtitle {
        font-size: 13px;
        color: #777;
        margin-bottom: 20px;
    }

    /* Input */
    input {
        width: 100%;
        padding: 12px;
        background: #0f0f14;
        border: 1px solid #2a2a32;
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        outline: none;
        margin-top: 10px;
    }

    input::placeholder {
        color: #666;
    }

    /* Focus effect */
    input:focus {
        border-color: #ff4da6;
    }

    /* Button */
    button {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        background: #1f1f25;
        border: 1px solid #2a2a32;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
    }

    /* Hover effect (pink accent) */
    button:hover {
        background: #2a2a32;
        border-color: #ff4da6;
        color: #ff4da6;
    }
</style>
    </style>
</head>

<body>

<div class="login-container">
    <h2>🤖 AI Support Login</h2>
    <p class="subtitle">Enter your Customer ID to continue</p>

    <form method="POST">
        <input 
            name="customer_id" 
            placeholder="e.g. hCT0x9JiGXBQ" 
            required 
        />
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
